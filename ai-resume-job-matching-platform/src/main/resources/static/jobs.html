<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Jobs | AI Resume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">

<!-- Sidebar (Same as Dashboard) -->
<aside class="w-64 bg-white border-r border-slate-200 flex flex-col">
    <div class="h-16 flex items-center px-6 border-b border-slate-200">
        <h1 class="text-2xl font-bold text-blue-600">AI Resume</h1>
    </div>
    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
        <a href="/dashboard.html" class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg font-medium transition-colors">Dashboard</a>
        <a href="/jobs.html" class="flex items-center px-4 py-3 text-blue-600 bg-blue-50 rounded-lg font-medium">Search Jobs</a>
        <a href="/applications.html" class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg font-medium transition-colors">My Applications</a>
        <a href="/resume.html" class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg font-medium transition-colors">Resume & ATS</a>
        <a href="/profile.html" class="flex items-center px-4 py-3 text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-lg font-medium transition-colors">Profile</a>
    </nav>
    <div class="p-4 border-t border-slate-200">
        <button onclick="app.logout()" class="w-full py-2 text-red-600 hover:bg-red-50 rounded-lg font-medium">Logout</button>
    </div>
</aside>

<!-- Main Content -->
<main class="flex-1 flex flex-col h-screen overflow-hidden relative">
    <!-- REPLACE YOUR EXISTING HEADER WITH THIS -->
    <header class="bg-white shadow-sm border-b border-slate-200 sticky top-0 z-[100]">
        <div class="flex justify-between items-center px-8 h-16">
            <h2 class="text-xl font-bold text-slate-800">Search Jobs</h2>

            <div class="flex items-center space-x-6">
                <!-- Notification Bell -->
                <div class="relative cursor-pointer" id="notificationDropdownToggle">
                    <div class="relative p-2 text-slate-500 hover:text-blue-600 transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                        </svg>
                        <span id="unreadBadge" class="absolute top-1 right-1 bg-red-500 text-white text-[10px] font-bold h-4 w-4 rounded-full flex items-center justify-center hidden">0</span>
                    </div>

                    <!-- Dropdown Menu (Fixed Positioning) -->
                    <div id="notificationMenu" class="absolute right-0 mt-2 w-80 bg-white rounded-xl shadow-2xl border border-slate-200 hidden z-[100] transform origin-top-right">
                        <div class="p-3 border-b border-slate-100 flex justify-between items-center bg-slate-50 rounded-t-xl">
                            <h3 class="font-bold text-slate-800 text-sm">Notifications</h3>
                            <button onclick="markAllAsRead()" class="text-xs text-blue-600 hover:underline font-medium">Mark all read</button>
                        </div>
                        <div id="notificationList" class="max-h-80 overflow-y-auto">
                            <div class="p-4 text-center text-sm text-slate-500">Loading...</div>
                        </div>
                    </div>
                </div>

                <!-- Profile Info -->
                <div class="flex items-center gap-3">
                    <div class="text-right hidden md:block">
                        <div class="text-sm font-bold text-slate-800" id="nav-user-name">Loading...</div>
                        <div class="text-xs text-slate-500">Candidate</div>
                    </div>
                    <div class="h-10 w-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-lg shadow-sm border-2 border-white cursor-pointer hover:bg-blue-700 transition-colors">
                        U
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-8">
        <div class="max-w-6xl mx-auto">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Recommended for You</h2>

            <!-- Loading Skeleton -->
            <div id="loadingJobs" class="text-center py-10 text-slate-500 font-medium">
                Loading jobs from AI matching engine...
            </div>

            <!-- Job Listings Grid -->
            <div id="jobListings" class="grid grid-cols-1 lg:grid-cols-2 gap-6 hidden">
                <!-- Dynamic Job Cards will be injected here -->
            </div>
        </div>
    </div>

    <!-- Apply Modal (Hidden by default) -->
    <div id="applyModal" class="hidden absolute inset-0 bg-slate-900 bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
            <div class="p-6 border-b border-slate-200 flex justify-between items-center">
                <h3 class="text-xl font-bold text-slate-800">Apply for Job</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-red-500">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-6">
                <form id="applyForm">
                    <input type="hidden" id="applyJobId">
                    <p class="text-slate-600 mb-4 text-sm">Your primary parsed resume will be automatically attached to this application.</p>

                    <label class="block text-sm font-medium text-slate-700 mb-1">Cover Letter (Optional)</label>
                    <textarea id="coverLetter" rows="4" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-600 outline-none" placeholder="Why are you a good fit?"></textarea>

                    <div id="applyStatus" class="mt-3 text-sm font-medium hidden p-2 rounded"></div>

                    <button type="submit" id="confirmApplyBtn" class="btn btn-primary w-full mt-4 py-3">Submit Application</button>
                </form>
            </div>
        </div>
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/app.js"></script>
<script src="/js/jobs.js"></script>
</body>
</html>
