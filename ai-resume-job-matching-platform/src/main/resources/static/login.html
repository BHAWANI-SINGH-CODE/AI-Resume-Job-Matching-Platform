<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Resume Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body class="bg-slate-50 flex flex-col min-h-screen">

<nav class="bg-white shadow px-8 py-5 flex justify-between items-center">
    <a href="/index.html" class="text-2xl font-bold text-blue-600">AI Resume</a>
    <a href="/register.html" class="text-slate-600 hover:text-blue-600 font-medium">New here? Register</a>
</nav>

<main class="flex-grow flex items-center justify-center p-6">
    <div class="card w-full max-w-md">
        <div class="card-body p-8">
            <h2 class="text-3xl font-bold text-center mb-2">Welcome Back</h2>
            <p class="text-slate-500 text-center mb-8">Login to access your dashboard.</p>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:outline-none" placeholder="you@example.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:outline-none" placeholder="••••••••">
                </div>

                <div id="error-msg" class="text-red-500 text-sm hidden text-center"></div>

                <button type="submit" class="btn btn-primary w-full py-3 text-lg mt-4" id="loginBtn">
                    Login
                </button>
            </form>
        </div>
    </div>
</main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
