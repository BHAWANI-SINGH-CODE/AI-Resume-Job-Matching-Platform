<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Resume</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

<!-- Navbar -->
<header class="bg-white border-b border-slate-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-bold text-blue-600 tracking-tight">AI Resume</span>
        </div>
        <a href="/login.html" class="text-sm font-medium text-slate-600 hover:text-blue-600 transition-colors">Already have an account? Login</a>
    </div>
</header>

<!-- Register Container -->
<main class="flex-1 flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-100 overflow-hidden">
        <div class="p-8">
            <div class="text-center mb-8">
                <h1 class="text-2xl font-bold text-slate-800">Create an Account</h1>
                <p class="text-slate-500 text-sm mt-2">Join the AI-powered job matching platform.</p>
            </div>

            <!-- Role Selection Tabs -->
            <div class="flex bg-slate-100 rounded-lg p-1 mb-8">
                <button type="button" id="tab-candidate" onclick="selectRole('USER')" class="flex-1 py-2 text-sm font-semibold rounded-md bg-white shadow text-blue-600 transition-all">
                    Candidate
                </button>
                <button type="button" id="tab-recruiter" onclick="selectRole('COMPANY')" class="flex-1 py-2 text-sm font-semibold rounded-md text-slate-500 hover:text-slate-700 transition-all">
                    Recruiter
                </button>
            </div>

            <form id="registerForm" class="space-y-5">
                <!-- Hidden field to send EXACT enum to backend -->
                <input type="hidden" id="role" value="USER">

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Full Name (or Contact Person)</label>
                    <input type="text" id="fullName" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition-all" placeholder="John Doe">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                    <input type="email" id="email" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition-all" placeholder="you@example.com">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition-all" placeholder="••••••••">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Confirm Password</label>
                    <input type="password" id="confirmPassword" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-600 focus:border-blue-600 outline-none transition-all" placeholder="••••••••">
                </div>

                <div id="error-msg" class="hidden text-sm text-red-600 bg-red-50 border border-red-100 p-3 rounded-lg text-center font-medium"></div>

                <button type="submit" id="registerBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-lg transition-colors shadow-md hover:shadow-lg">
                    Create Account
                </button>
            </form>
        </div>
    </div>
</main>

<script src="/js/api.js"></script>
<script>
    // --- Inline Role Selection Logic ---
    function selectRole(role) {
        document.getElementById('role').value = role;
        const btnCandidate = document.getElementById('tab-candidate');
        const btnRecruiter = document.getElementById('tab-recruiter');

        if (role === 'USER') {
            btnCandidate.className = "flex-1 py-2 text-sm font-semibold rounded-md bg-white shadow text-blue-600 transition-all";
            btnRecruiter.className = "flex-1 py-2 text-sm font-semibold rounded-md text-slate-500 hover:text-slate-700 transition-all";
        } else {
            btnRecruiter.className = "flex-1 py-2 text-sm font-semibold rounded-md bg-white shadow text-blue-600 transition-all";
            btnCandidate.className = "flex-1 py-2 text-sm font-semibold rounded-md text-slate-500 hover:text-slate-700 transition-all";
        }
    }

    // --- Inline Form Submit Logic ---
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('registerBtn');
        const errorMsg = document.getElementById('error-msg');

        const fullName = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        // Getting exact role (USER or COMPANY)
        const role = document.getElementById('role').value;

        if (password !== confirmPassword) {
            errorMsg.innerText = "Passwords do not match!";
            errorMsg.classList.remove('hidden');
            return;
        }

        try {
            btn.innerText = "Creating Account...";
            btn.disabled = true;
            errorMsg.classList.add('hidden');

            const payload = { fullName, email, password, confirmPassword, role };

            // Call API
            const response = await api.request('/auth/register', 'POST', payload);

            // Save Token
            const token = response.accessToken || response.token || response;
            localStorage.setItem('token', token);

            // Redirect logic
            if (role === 'COMPANY') {
                window.location.href = '/company-profile.html'; // Pushes them to setup company!
            } else {
                window.location.href = '/dashboard.html';
            }

        } catch (error) {
            errorMsg.innerText = error.message || "Registration failed.";
            errorMsg.classList.remove('hidden');
        } finally {
            btn.innerText = "Create Account";
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
